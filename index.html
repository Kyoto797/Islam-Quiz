<!DOCTYPE html>
<html>
<head>
    <title>Islamic Quiz Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: white;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .quiz-box {
            background: rgba(0,0,0,0.7);
            width: 500px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            width: 80%;
            margin: 10px auto;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #555;
        }

        #timer {
            font-size: 18px;
            margin-bottom: 15px;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            height: 25px;
        }
    </style>
</head>
<body>

<div class="quiz-box">
    <h1>🕌 Islamic Quiz</h1>
    <div id="timer">Time: 10</div>
    <p id="question">Question appears here</p>

    <button id="btnA" onclick="checkAnswer('A')">A</button>
    <button id="btnB" onclick="checkAnswer('B')">B</button>
    <button id="btnC" onclick="checkAnswer('C')">C</button>
    <button id="btnD" onclick="checkAnswer('D')">D</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
